<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
          initial-scale=1.0">

    <title>Edit Product</title>

    <link rel="stylesheet"
          href="{{ url_for(
          'static',
          filename='css/style.css') }}">
</head>

<body>

<section class="admin-form">

    <h1>Edit Product</h1>

    <form method="POST">

        <input type="text"
               name="name"
               value="{{ product.name }}"
               required>

        <input type="text"
               name="price"
               value="{{ product.price }}"
               required>

        <input type="text"
               name="category"
               value="{{ product.category }}"
               required>

        <textarea
            name="description"
            required>{{ product.description }}</textarea>

        <button type="submit">
            Update Product
        </button>

    </form>

</section>

</body>
</html>
