```html
<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow:
                0 4px 15px
                rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
        }

    </style>
</head>

<body>

    <div class="box">

        <h2>
            Admin Login
        </h2>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
```
